<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Odin</title>
    <link href="https://fonts.cdnfonts.com/css/norse-bold" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <aside class="sidebar">
            <div class="sidebar-overlay"></div>
            <div class="logo-bar">
                <img
                    src="https://z-cdn-media.chatglm.cn/files/89390ad3-85c8-4ec4-acb1-a65e4a9b5dd8.png?auth_key=1884283006-85ce9b3e649945a185290bb0cd183837-0-fc983f8fe65d696daa1012466ca1088c"
                    alt="Odin Logo"
                >
                <span>ODIN</span>
            </div>
        </aside>

        <main class="main-content">
            <section class="intro-section">
                <p>
                    This is not a real online service! You know you need something
                    like this in your life to help you realize your deepest dreams.
                    Sign up <em>now</em> to get started.
                </p>
                <p>You know you want to.</p>
            </section>

            <section class="form-section">
                <h2>Let's do this!</h2>
                <form id="signup-form" action="#" method="POST" novalidate>

                    <div class="form-grid">
                        <div class="field">
                            <label for="first-name">FIRST NAME</label>
                            <input type="text" id="first-name" name="first_name" required>
                        </div>

                        <div class="field">
                            <label for="last-name">LAST NAME</label>
                            <input type="text" id="last-name" name="last_name" required>
                        </div>

                        <div class="field">
                            <label for="email">EMAIL</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="field">
                            <label for="phone">PHONE NUMBER</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>

                        <div class="field">
                            <label for="password">PASSWORD</label>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                required
                                minlength="8"
                            >
                        </div>

                        <div class="field">
                            <label for="confirm-password">CONFIRM PASSWORD</label>
                            <input
                                type="password"
                                id="confirm-password"
                                name="confirm_password"
                                required
                                minlength="8"
                            >
                        </div>

                        <p class="password-hint">
                            *Passwords must be at least 8 characters in length.
                        </p>
                    </div>

                    <button type="submit" class="create-btn">Create Account</button>
                </form>

                <p class="login-text">
                    Already have an account? <a href="#">Log in</a>
                </p>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
